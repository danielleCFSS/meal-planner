.mp-recipe{margin-top:10px;padding:12px 13px;background:var(--paper);border:1px solid var(--line);border-radius:10px;}
.mp-rdesc{font-size:13px;color:var(--muted);font-style:italic;margin:0 0 10px;line-height:1.5;}
.mp-rsec{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--olive);font-weight:600;margin:10px 0 6px;}
.mp-rings{margin:0;padding-left:18px;}
.mp-rings li{font-size:14px;line-height:1.6;}
.mp-rsteps{margin:0;padding-left:20px;}
.mp-rsteps li{font-size:14px;line-height:1.55;margin-bottom:7px;padding-left:3px;}
.mp-icbtn{border:none;background:transparent;color:var(--muted);cursor:pointer;display:inline-flex;padding:4px;border-radius:7px;}
.mp-icbtn:hover{color:var(--ink);background:var(--paper);}
.mp-add{display:inline-flex;align-items:center;gap:6px;margin-top:10px;border:1px dashed var(--line);background:transparent;color:var(--olive);font:inherit;font-weight:600;font-size:14px;padding:8px 12px;border-radius:9px;cursor:pointer;}
.mp-add:hover{border-color:var(--olive);}
.mp-picker{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
.mp-picker-label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;}
.mp-pick{text-align:left;border:1px solid var(--line);background:var(--paper);font:inherit;padding:9px 11px;border-radius:9px;cursor:pointer;}
.mp-pick:hover{border-color:var(--olive);}
.mp-pick-name{font-size:14px;}
.mp-pick-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.mp-float{position:fixed;transform:translate(-50%,-130%);pointer-events:none;z-index:60;background:var(--card);border:1px solid var(--olive);border-radius:9px;padding:7px 12px;font-size:14px;box-shadow:0 8px 22px rgba(51,48,42,.18);}
.mp-aisle{font-family:"Fraunces",serif;font-size:16px;font-weight:600;color:var(--olive);margin:18px 0 7px;}
.mp-item{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:1px solid var(--line);}
.mp-box{width:21px;height:21px;border-radius:6px;border:1.5px solid var(--line);background:var(--card);cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:#F6F3EA;font-size:13px;}
.mp-box[data-on="1"]{background:var(--olive);border-color:var(--olive);}
.mp-item-name{flex:1;font-size:15px;}
.mp-item-name[data-on="1"]{text-decoration:line-through;color:var(--muted);}
.mp-qty{color:var(--muted);font-size:13px;font-variant-numeric:tabular-nums;}
.mp-empty{background:var(--card);border:1px dashed var(--line);border-radius:13px;padding:26px 18px;text-align:center;color:var(--muted);font-size:14px;}
.mp-row{display:flex;gap:8px;align-items:center;}
.mp-input{font:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink);width:100%;}
.mp-input:focus-visible{outline:2px solid var(--olive);outline-offset:1px;}
.mp-area{font:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink);width:100%;line-height:1.5;resize:vertical;}
.mp-btn{border:none;background:var(--olive);color:#F6F3EA;font:inherit;font-weight:600;font-size:14px;padding:9px 14px;border-radius:9px;cursor:pointer;}
.mp-btn[data-ghost="1"]{background:transparent;color:var(--olive);border:1px solid var(--line);}
.mp-export{display:flex;flex-direction:column;gap:9px;margin-top:16px;}
.mp-xbtn{display:flex;align-items:flex-start;gap:11px;text-align:left;border:1px solid var(--line);background:var(--card);font:inherit;padding:13px 14px;border-radius:11px;cursor:pointer;}
.mp-xbtn:hover{border-color:var(--olive);}
.mp-xbtn svg{color:var(--olive);flex-shrink:0;margin-top:2px;}
.mp-xtitle{font-weight:600;font-size:14px;}
.mp-xdesc{font-size:13px;color:var(--muted);margin-top:2px;line-height:1.45;}
.mp-glance{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:4px 14px;}
.mp-gline{display:flex;gap:13px;padding:12px 0;border-bottom:1px solid var(--line);align-items:baseline;}
.mp-gline:last-child{border-bottom:none;}
.mp-gday{font-family:"Fraunces",serif;font-weight:600;font-size:15px;width:38px;flex-shrink:0;}
.mp-gmeal{font-size:15px;line-height:1.35;}
.mp-gmeal[data-empty="1"]{color:var(--muted);font-style:italic;}
.mp-gguest{color:var(--clay);font-size:13px;}
.mp-note{color:var(--muted);font-size:13px;line-height:1.55;margin-top:13px;}
.mp-rcard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:11px;}
.mp-rname{font-family:"Fraunces",serif;font-size:18px;font-weight:600;}
.mp-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.mp-tag{font-size:11px;background:var(--paper);border:1px solid var(--line);color:var(--muted);padding:2px 8px;border-radius:999px;}
.mp-ing{font-size:13px;color:var(--muted);margin-top:9px;line-height:1.6;}
.mp-sel{font:inherit;font-size:13px;padding:9px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink);}
.mp-irow{display:grid;grid-template-columns:1fr 56px 56px 1fr 30px;gap:6px;margin-bottom:6px;align-items:center;}
.mp-foot{color:var(--muted);font-size:12px;text-align:center;padding:8px 0 0;}
.mp-print{display:none;}
@media (max-width:540px){.mp-irow{grid-template-columns:1fr 46px 46px;}.mp-irow .mp-sel.wide{grid-column:1 / 3;}.mp-irow .mp-rm{grid-column:3;}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;}}
@media print{
 .mp{background:#fff !important;}
 .mp-wrap{display:none !important;}
 .mp-float{display:none !important;}
 .mp-print{display:block !important;color:#1a1a1a;font-family:Georgia,"Times New Roman",serif;}
 .mp-print-page{page-break-after:always;}
 .mp-print-page:last-child{page-break-after:auto;}
 .pp-recipe{break-inside:avoid;}
 @page{margin:15mm;}
}
.pp-h1{font-family:"Fraunces",Georgia,serif;font-size:27px;font-weight:600;margin:0 0 3px;}
.pp-sub{color:#555;font-size:13px;margin:0 0 16px;}
.pp-day-row{display:flex;gap:14px;padding:8px 0;border-bottom:1px solid #e0e0e0;font-size:15px;}
.pp-day-name{font-family:"Fraunces",Georgia,serif;font-weight:600;width:46px;flex-shrink:0;}
.pp-rday{font-family:"Fraunces",Georgia,serif;font-size:23px;font-weight:600;margin:0;}
.pp-recipe{margin-top:16px;}
.pp-rname{font-family:"Fraunces",Georgia,serif;font-size:18px;font-weight:600;margin:0 0 2px;}
.pp-meta{color:#555;font-size:12px;margin:0 0 8px;}
.pp-desc{font-size:13px;font-style:italic;color:#444;margin:0 0 10px;}
.pp-sec{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#777;margin:12px 0 5px;font-family:ui-sans-serif,sans-serif;}
.pp-ings{margin:0;padding-left:18px;}
.pp-ings li{font-size:13px;line-height:1.7;}
.pp-steps{margin:0;padding-left:20px;}
.pp-steps li{font-size:13.5px;line-height:1.5;margin-bottom:7px;}
.mp-tabs{overflow-x:auto;}
.mp-takeout{margin:8px 0 2px;font-size:12px;color:var(--clay);font-weight:600;background:rgba(176,99,60,.08);border:1px solid rgba(176,99,60,.25);border-radius:8px;padding:6px 9px;}
.mp-stocksec{margin-bottom:18px;}
.mp-have-where{font-size:11px;color:var(--muted);min-width:62px;text-transform:uppercase;letter-spacing:.04em;}
.mp-toggle{border:1px solid var(--line);background:var(--paper);color:var(--olive);font:inherit;font-weight:600;font-size:12px;padding:4px 10px;border-radius:999px;cursor:pointer;white-space:nowrap;}
.mp-toggle[data-on="1"]{background:var(--clay);color:#F6F3EA;border-color:var(--clay);}
.mp-sync{font-size:12px;color:var(--muted);margin:8px 0;}
.mp-tokenbox{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 13px;margin-bottom:16px;}
.mp-qtyinput{font:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);width:96px;flex-shrink:0;}
.mp-stockhead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:14px;}
.mp-sh-cell{flex:1;min-width:118px;}
.mp-sh-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.mp-sh-val{font-size:14px;font-weight:600;margin-top:2px;}
.mp-syncbar{margin-top:10px;padding-top:12px;border-top:1px solid var(--line);}
.mp-linkbtn{border:none;background:transparent;color:var(--olive);font:inherit;font-size:12px;text-decoration:underline;cursor:pointer;padding:0;}
.mp-cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.mp-cat{border:1px solid var(--line);background:var(--card);color:var(--muted);font:inherit;font-weight:600;font-size:12px;padding:5px 11px;border-radius:999px;cursor:pointer;}
.mp-cat[data-on="1"]{background:var(--olive);color:#F6F3EA;border-color:var(--olive);}
